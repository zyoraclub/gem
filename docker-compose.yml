version: '3.8'

services:
  backend:
    build: ./backend
    volumes:
      - ./backend/gem_automation.db:/app/gem_automation.db
      - ./backend/client_secrets.json:/app/client_secrets.json
    environment:
      - DATABASE_URL=sqlite:///./gem_automation.db
      - OAUTH_REDIRECT_URI=http://gem.zyora.cloud/api/oauth/callback
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://gem.zyora.cloud/api
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
